<!DOCTYPE html>
<html>
<head>
    <title>My Bookings</title>
</head>
<body>

<h2>My Bookings</h2>

<table border="1">

<tr>
    <th>Booking ID</th>
    <th>Hotel Name</th>
</tr>

{% for booking in bookings %}
<tr>
    <td>{{ booking.id }}</td>
    <td>{{ booking.hotel_name }}</td>
    <th>Action</th>
    <td>
    <a href="/cancel_booking/{{ booking.id }}">
        Cancel
    </a>
</td>
</tr>
{% endfor %}

</table>

<br>

<a href="/hotels">Back to Hotels</a>

</body>
</html>
